name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
          - 24
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Run tests
        run: npm test

      - name: Verify pack output
        run: npm pack --dry-run

      - name: Pack tarball
        id: pack
        run: |
          TARBALL="$(npm pack --silent)"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Verify packed tarball with npx smoke test
        run: |
          PROJECT_DIR="${RUNNER_TEMP}/agent-plugins-installer-smoke-${{ matrix.node-version }}"
          CACHE_DIR="${RUNNER_TEMP}/agent-plugins-installer-npm-cache-${{ matrix.node-version }}"
          mkdir -p "$PROJECT_DIR" "$CACHE_DIR"

          NPM_CONFIG_CACHE="$CACHE_DIR" npx --yes --package "./${{ steps.pack.outputs.tarball }}" agent-plugins-installer install codex --scope project --cwd "$PROJECT_DIR" --plugins github

          test -f "$PROJECT_DIR/.codex/plugins/github/.codex-plugin/plugin.json"
          test -f "$PROJECT_DIR/.agents/plugins/marketplace.json"
