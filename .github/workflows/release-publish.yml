name: Release Publish Package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify Release (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
          - 24
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Validate release tag against package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "release tag ($RELEASE_TAG) does not match package.json version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Verify pack output
        run: npm pack --dry-run

      - name: Pack tarball
        id: pack
        run: |
          TARBALL="$(npm pack --silent)"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Verify packed tarball with npx smoke test
        run: |
          PROJECT_DIR="${RUNNER_TEMP}/agent-plugins-installer-release-smoke-${{ matrix.node-version }}"
          CACHE_DIR="${RUNNER_TEMP}/agent-plugins-installer-release-npm-cache-${{ matrix.node-version }}"
          mkdir -p "$PROJECT_DIR" "$CACHE_DIR"

          NPM_CONFIG_CACHE="$CACHE_DIR" npx --yes --package "./${{ steps.pack.outputs.tarball }}" agent-plugins-installer install codex --scope project --cwd "$PROJECT_DIR" --plugins github

          test -f "$PROJECT_DIR/.codex/plugins/github/.codex-plugin/plugin.json"
          test -f "$PROJECT_DIR/.agents/plugins/marketplace.json"

  publish:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Publish to npm with trusted publishing
        run: npm publish --access public
